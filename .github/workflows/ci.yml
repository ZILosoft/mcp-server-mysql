name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:eslint

      - name: Build
        run: pnpm build

      # Runs the full suite (unit + integration + e2e) against a fresh MySQL
      # spun up via docker-compose.test.yml — same path as `pnpm test:docker`
      # locally, so CI behaviour matches a developer's machine.
      - name: Run tests (dockerized MySQL)
        run: pnpm test:docker
