name: Docker Publish

on:
  # Manual trigger — pass a version to publish a specific tag (e.g. "2.1.0")
  # Leave version empty to publish only the `latest` tag from the current commit.
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for the Docker image (e.g. 2.1.0). Leave empty for latest only."
        required: false
        default: ""
  # Also triggered automatically on version tag push alongside npm-publish
  push:
    tags:
      - "v*"

jobs:
  docker:
    runs-on: ubuntu-latest
    if: github.actor == 'ZILosoft'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mcp-server-mysql
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
