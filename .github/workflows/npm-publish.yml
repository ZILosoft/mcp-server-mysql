name: NPM Publish

on:
  # Manual trigger from the Actions UI
  workflow_dispatch:
  # Triggered when a GitHub Release is published
  release:
    types: [created]
  # Triggered on version tag push (e.g. `git tag v2.0.9 && git push --tags`)
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    # Hard restriction: only this GitHub user can run the publish job.
    # Even if someone else has write access and tries to trigger the workflow,
    # the job will exit immediately because github.actor won't match.
    if: github.actor == 'ZILosoft'
    # Deploy into a protected environment. Configure the `npm-publish` environment
    # in repo Settings → Environments with:
    #   - Required reviewers: ZILosoft
    #   - Deployment branches: only protected branches / tags matching v*
    #   - Environment secret: NPM_TOKEN (stored here instead of repo-level)
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@zilosoft/mcp-server-mysql
    # Required for npm provenance (cryptographically links the published package
    # to this GitHub repo + commit, visible on npmjs.com)
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify tag matches package version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish to NPM
        run: npm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    if: github.actor == 'ZILosoft'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mcp-server-mysql
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
