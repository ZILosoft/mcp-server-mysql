services:
  mysql:
    image: mysql:8.0
    container_name: mcp-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mcp_test_db
    ports:
      - "3306:3306"
    # Use tmpfs so the data lives in RAM — tests start fast and leave no residue
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
